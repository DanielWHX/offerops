<!doctype html>
<html>
  <head>
    <title>Security Engineering Intern at Bugcrowd</title>
    <meta property="og:title" content="Security Engineering Intern at Bugcrowd">
  </head>
  <body>
    <main id="main" class="application--container">
      <section id="content">
        <h1>Security Engineering Intern</h1>
        <div class="location">Remote, USA</div>
      </section>
      <form id="application_form" class="application-form">
        <label for="first_name">First Name</label>
        <input id="first_name" name="job_application[first_name]" required>

        <label for="last_name">Last Name</label>
        <input id="last_name" name="job_application[last_name]" required>

        <label for="email">Email</label>
        <input id="email" name="job_application[email]" type="email" required>

        <label for="phone">Phone</label>
        <input id="phone" name="job_application[phone]" type="tel">

        <label for="resume">Resume/CV</label>
        <input id="resume" name="job_application[resume]" type="file" required>

        <input type="submit" value="Submit Application">
      </form>
    </main>
  </body>
</html>
